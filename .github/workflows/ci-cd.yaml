# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "helm/**"

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.22

      - name: Build
        run: go build -o go-webapp

      - name: Run Tests
        run: go test ./...

  code-quality:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  push:
    runs-on: 'ubuntu-latest'
    needs: [build, code-quality]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/go-webapp:${{ github.sha }}

  update-new-tag-in-helm-chart:
    runs-on: 'ubuntu-latest'
    needs: push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GIT_TOKEN }}
      - name: Update Helm Chart with New Tag
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" helm/go-web-app-chart/values.yaml
      - name: Commit and Push Changes
        run: |
          git config --global user.name "juankparanoid1"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git add helm/go-web-app-chart/values.yaml
          git commit -m "Update Helm chart with new image tag: ${{ github.sha }}"
          git push origin main
